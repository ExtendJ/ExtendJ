jastadd.module = 'java11 backend'

task launchCodeProber(type: org.codeprober.LaunchCodeProber) {
  dependsOn 'jar'
  toolArgs = ['-XparseOnly']
  toolJar = file('extendj.jar')
}
task updateCodeProber(type: org.codeprober.UpdateCodeProber) {
  // Intentionally empty, it works as long as the `type: ` remains on the line above
}
task cpr {
  dependsOn 'launchCodeProber'
}
